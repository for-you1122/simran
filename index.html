<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
  text-align: center;
  overflow-x: hidden;
}

/* Lock Screen */
#lockScreen {
  margin-top: 150px;
}

#mainContent {
  display: none;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px 20px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 20px;
  cursor: pointer;
  margin: 10px;
}

/* Slides */
.container {
  padding-top: 80px;
}

.slide {
  display: none;
  animation: fade 1s ease;
}

.slide.active {
  display: block;
}

/* Photos */
.photos img {
  width: 120px;
  margin: 10px;
  border-radius: 20px;
  transition: 0.3s;
}

.photos img:hover {
  transform: scale(1.1);
}

/* Penguins */
.penguins div {
  font-size: 60px;
  cursor: pointer;
  display: inline-block;
  margin: 15px;
  transition: 0.3s;
}

.penguins div:hover {
  transform: scale(1.3);
}

/* Music button */
.music-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  background: white;
  padding: 10px;
  border-radius: 50%;
  cursor: pointer;
}

/* Animations */
@keyframes fade {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Floating hearts */
.hearts::before {
  content: "❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️";
  position: fixed;
  width: 100%;
  bottom: -50px;
  animation: floatUp 10s linear infinite;
  opacity: 0.5;
}

@keyframes floatUp {
  from {transform: translateY(0);}
  to {transform: translateY(-100vh);}
}
</style>

</head>
<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <h2>Enter Passcode 🔐</h2>
  <input type="password" id="passInput" placeholder="Enter code">
  <button onclick="checkPass()">Unlock</button>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent">

<audio id="bgMusic" loop>
  <source src="assets/music.mp3" type="audio/mp3">
</audio>

<audio id="voiceNote">
  <source src="assets/voice.mp3" type="audio/mp3">
</audio>

<div class="music-btn" onclick="toggleMusic()">🎵</div>

<div class="container">

  <!-- Slide 1 -->
  <div class="slide active">
    <h1>Happy Birthday ❤️</h1>
    <p id="typing"></p>
    <button onclick="nextSlide()">Next</button>
  </div>

  <!-- Slide 2 -->
  <div class="slide">
    <h2>Our Memories 💕</h2>
    <div class="photos">
      <img src="assets/img1.jpg">
      <img src="assets/img2.jpg">
      <img src="assets/img3.jpg">
    </div>
    <button onclick="nextSlide()">Next</button>
  </div>

  <!-- Slide 3 -->
  <div class="slide">
    <h2>Choose a Penguin 🐧</h2>
    <div class="penguins">
      <div onclick="showMessage(1)">🐧</div>
      <div onclick="showMessage(2)">🐧</div>
      <div onclick="showMessage(3)">🐧</div>
    </div>
    <p id="message"></p>
    <button onclick="nextSlide()">Next</button>
  </div>

  <!-- Final Slide -->
  <div class="slide">
    <h1>I Love You ❤️</h1>
    <p>You’re my favorite person. Always.</p>
  </div>

</div>

<div class="hearts"></div>

</div>

<script>
/* PASSWORD */
function checkPass() {
  let pass = document.getElementById("passInput").value;

  if (pass === "1234") {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    startExperience();
  } else {
    alert("Wrong passcode ❌");
  }
}

/* START */
function startExperience() {
  typingEffect();

  document.body.addEventListener("click", () => {
    document.getElementById("bgMusic").play().catch(()=>{});
    document.getElementById("voiceNote").play().catch(()=>{});
  }, { once: true });
}

/* SLIDES */
let current = 0;
let slides = document.querySelectorAll(".slide");

function nextSlide() {
  slides[current].classList.remove("active");
  current++;
  if (current >= slides.length) current = slides.length - 1;
  slides[current].classList.add("active");
}

/* TYPING EFFECT */
const text = "You are not just special… you are my favorite feeling ❤️";
let i = 0;

function typingEffect() {
  let el = document.getElementById("typing");
  let interval = setInterval(() => {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
    } else {
      clearInterval(interval);
    }
  }, 50);
}

/* PENGUIN MESSAGE */
function showMessage(num) {
  let msg = document.getElementById("message");

  if (num === 1) {
    msg.innerText = "You make everything better ❤️";
  } else if (num === 2) {
    msg.innerText = "I’d choose you again and again 💕";
  } else {
    msg.innerText = "Stay with me forever 🥺";
  }
}

/* MUSIC */
function toggleMusic() {
  let music = document.getElementById("bgMusic");

  if (music.paused) {
    music.play();
  } else {
    music.pause();
  }
}
</script>

</body>
</html>
